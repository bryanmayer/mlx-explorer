<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Model Explorer</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Auto-generated by generate-explorer-data.R + generate-explorer-figures.R -->
  <script src="model-data.js?v=20260301115252"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">

// ─── Data (injected by model-data.js, generated by R/generate-explorer-data.R)
// Falls back to empty state if the data file hasn't been generated yet.

const {
  registry:     REGISTRY      = [],
  fixedEffects: FIXED_EFFECTS  = {},
  randomEffects:RANDOM_EFFECTS = {},
  errorParams:  ERROR_PARAMS   = {},
  shrinkage:    SHRINKAGE      = {},
} = (typeof window !== "undefined" && window.MODEL_DATA) ? window.MODEL_DATA : {};

const FIGURES = (typeof window !== "undefined" && window.MODEL_FIGURES) ? window.MODEL_FIGURES : null;

const ALL_RUN_IDS = REGISTRY.map((r) => r.run_id);

// ─── Helpers ──────────────────────────────────────────────────────────────────

function fmtNum(v) {
  if (v === null || v === undefined) return "—";
  if (Math.abs(v) < 0.001) return v.toExponential(2);
  return Number(v).toPrecision(4);
}

function shrinkageColor(pct) {
  if (pct < 25)  return "bg-green-100 text-green-800";
  if (pct < 40)  return "bg-yellow-100 text-yellow-800";
  if (pct < 50)  return "bg-amber-200 text-amber-900";
  return "bg-red-200 text-red-900";
}

function kassRaftery(delta) {
  if (delta === 0)   return "Best model";
  if (delta <= 2)    return "Negligible";
  if (delta <= 6)    return "Positive";
  if (delta <= 10)   return "Strong";
  return "Very strong";
}

// ─── Sub-components ───────────────────────────────────────────────────────────

function StatusBadge({ status }) {
  const map = {
    converged: { cls: "bg-green-100 text-green-700", label: "✓ Clean" },
    warnings:  { cls: "bg-yellow-100 text-yellow-700", label: "⚠ Warn" },
    failed:    { cls: "bg-red-100 text-red-700", label: "✗ Failed" },
  };
  const { cls, label } = map[status] || { cls: "bg-gray-100 text-gray-600", label: status };
  return (
    <span className={`rounded-full text-xs px-2 py-0.5 font-medium ${cls}`}>
      {label}
    </span>
  );
}

function SummaryCard({ title, value, modelName, runId }) {
  return (
    <div className="bg-white border border-gray-200 rounded-lg p-4 shadow-sm">
      <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">{title}</div>
      <div className="text-2xl font-bold text-gray-900 font-mono">{value}</div>
      <div className="text-sm text-gray-600 mt-1 truncate">{modelName}</div>
      <div className="text-xs text-gray-400 mt-0.5">{runId}</div>
    </div>
  );
}

function EmptyState() {
  return (
    <div className="flex flex-col items-center justify-center h-64 text-gray-400">
      <div className="text-5xl mb-3">∅</div>
      <div className="text-base font-medium">No models selected</div>
      <div className="text-sm mt-1">Select models from the sidebar to explore results</div>
    </div>
  );
}

// ─── Tab: Overview ────────────────────────────────────────────────────────────

function OverviewTab({ selected, registry }) {
  if (selected.length === 0) return <EmptyState />;

  const rows = registry.filter((r) => selected.includes(r.run_id));

  const bestBic = [...rows].sort((a, b) => a.bic - b.bic)[0];
  const bestAic = [...rows].sort((a, b) => a.aic - b.aic)[0];
  const bestLl  = [...rows].sort((a, b) => a.ll  - b.ll )[0];

  return (
    <div className="space-y-6">
      {/* Summary cards */}
      <div className="grid grid-cols-3 gap-4">
        <SummaryCard title="Best BIC"  value={bestBic.bic.toFixed(1)} modelName={bestBic.model_name} runId={bestBic.run_id} />
        <SummaryCard title="Best AIC"  value={bestAic.aic.toFixed(1)} modelName={bestAic.model_name} runId={bestAic.run_id} />
        <SummaryCard title="Best −2LL" value={bestLl.ll.toFixed(1)}   modelName={bestLl.model_name}  runId={bestLl.run_id}  />
      </div>

      {/* Table */}
      <div className="overflow-x-auto rounded-lg border border-gray-200">
        <table className="min-w-full text-sm">
          <thead className="bg-gray-50 border-b border-gray-200">
            <tr>
              {["Run", "Model", "Status", "BIC", "BICc", "AIC", "AICc", "−2LL", "Est / Fix", "Error model", "Flags"].map((h) => (
                <th key={h} className="px-3 py-2 text-left text-xs font-semibold text-gray-600 uppercase tracking-wide whitespace-nowrap">
                  {h}
                </th>
              ))}
            </tr>
          </thead>
          <tbody className="divide-y divide-gray-100">
            {rows.map((r) => {
              const isBestBic = r.run_id === bestBic.run_id;
              return (
                <tr key={r.run_id} className={isBestBic ? "bg-green-50" : "bg-white hover:bg-gray-50"}>
                  <td className="px-3 py-2 font-mono text-xs text-gray-500 whitespace-nowrap">{r.run_id}</td>
                  <td className="px-3 py-2 font-medium text-gray-900 whitespace-nowrap">{r.model_name}</td>
                  <td className="px-3 py-2"><StatusBadge status={r.status} /></td>
                  <td className={`px-3 py-2 font-mono whitespace-nowrap ${isBestBic ? "font-bold text-green-700" : "text-gray-700"}`}>
                    {r.bic.toFixed(1)}
                  </td>
                  <td className="px-3 py-2 font-mono text-gray-500 whitespace-nowrap">{r.bicc != null ? r.bicc.toFixed(1) : "—"}</td>
                  <td className="px-3 py-2 font-mono text-gray-700 whitespace-nowrap">{r.aic.toFixed(1)}</td>
                  <td className="px-3 py-2 font-mono text-gray-500 whitespace-nowrap">{r.aicc != null ? r.aicc.toFixed(1) : "—"}</td>
                  <td className="px-3 py-2 font-mono text-gray-700 whitespace-nowrap">{r.ll.toFixed(1)}</td>
                  <td className="px-3 py-2 font-mono text-gray-600 whitespace-nowrap">{r.n_est} / {r.n_fixed}</td>
                  <td className="px-3 py-2 text-gray-600 whitespace-nowrap">{r.error_model}</td>
                  <td className="px-3 py-2 whitespace-nowrap">
                    <span className={`text-xs mr-2 ${r.high_rse_count > 0 ? "text-red-600 font-medium" : "text-gray-400"}`}>
                      ⚠ RSE ×{r.high_rse_count}
                    </span>
                    <span className={`text-xs ${r.high_shrinkage_count > 0 ? "text-amber-600 font-medium" : "text-gray-400"}`}>
                      ↑ shrink ×{r.high_shrinkage_count}
                    </span>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* Notes */}
      <div className="space-y-2">
        {rows.map((r) => r.notes && (
          <div key={r.run_id} className="text-xs text-gray-500 bg-gray-50 rounded px-3 py-2">
            <span className="font-mono font-semibold text-gray-600">{r.run_id}:</span> {r.notes}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Tab: Parameters ──────────────────────────────────────────────────────────

function ParamSection({ title, paramNames, getData, selectedRunIds, registry }) {
  const models = registry.filter((r) => selectedRunIds.includes(r.run_id));

  return (
    <div>
      <h3 className="text-sm font-semibold text-gray-700 mb-2 uppercase tracking-wide">{title}</h3>
      <div className="overflow-x-auto rounded-lg border border-gray-200 mb-6">
        <table className="min-w-full text-xs">
          <thead className="bg-gray-50 border-b border-gray-200">
            <tr>
              <th className="px-3 py-2 text-left text-xs font-semibold text-gray-600 uppercase">Parameter</th>
              {models.map((m) => (
                <th key={m.run_id} colSpan={2} className="px-3 py-2 text-center text-xs font-semibold text-gray-600 uppercase border-l border-gray-200">
                  {m.model_name}
                  <div className="font-normal text-gray-400 text-xs">{m.run_id}</div>
                </th>
              ))}
            </tr>
            <tr className="border-b border-gray-200">
              <th className="px-3 py-2"></th>
              {models.map((m) => (
                <><th key={`${m.run_id}-est`} className="px-3 py-1 text-center text-xs text-gray-500 border-l border-gray-200 font-normal">Est.</th>
                  <th key={`${m.run_id}-rse`} className="px-3 py-1 text-center text-xs text-gray-500 font-normal">RSE%</th></>
              ))}
            </tr>
          </thead>
          <tbody className="divide-y divide-gray-100">
            {paramNames.map((pname) => (
              <tr key={pname} className="bg-white hover:bg-gray-50">
                <td className="px-3 py-2 font-mono font-medium text-gray-700 whitespace-nowrap">{pname}</td>
                {models.map((m) => {
                  const data = getData(m.run_id);
                  const param = data ? data.find((p) => p.name === pname) : null;
                  if (!param) {
                    return (
                      <><td key={`${m.run_id}-est`} className="px-3 py-2 text-center text-gray-300 border-l border-gray-100">—</td>
                        <td key={`${m.run_id}-rse`} className="px-3 py-2 text-center text-gray-300">—</td></>
                    );
                  }
                  const highRse = !param.fixed && param.rse !== null && param.rse > 50;
                  return (
                    <>
                      <td key={`${m.run_id}-est`} className={`px-3 py-2 font-mono text-center border-l border-gray-100 whitespace-nowrap ${param.fixed ? "text-gray-400" : "text-gray-800"}`}>
                        {fmtNum(param.est)}
                      </td>
                      <td key={`${m.run_id}-rse`} className="px-3 py-2 text-center whitespace-nowrap">
                        {param.fixed ? (
                          <span className="bg-gray-100 text-gray-500 rounded px-1.5 py-0.5 text-xs font-medium">FIXED</span>
                        ) : param.rse === null ? (
                          <span className="text-gray-400">—</span>
                        ) : (
                          <span className={`font-mono ${highRse ? "text-red-600 font-semibold" : "text-gray-600"}`}>
                            {highRse ? "⚠ " : ""}{param.rse.toFixed(1)}
                          </span>
                        )}
                      </td>
                    </>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function ParametersTab({ selected, registry }) {
  if (selected.length === 0) return <EmptyState />;

  const allFixedNames = Array.from(
    new Set(Object.values(FIXED_EFFECTS).flatMap((arr) => arr.map((p) => p.name)))
  );
  const allOmegaNames = Array.from(
    new Set(Object.values(RANDOM_EFFECTS).flatMap((arr) => arr.map((p) => p.name)))
  );
  const allErrorNames = Array.from(
    new Set(Object.values(ERROR_PARAMS).flatMap((arr) => arr.map((p) => p.name)))
  );

  return (
    <div>
      <ParamSection
        title="Fixed Effects"
        paramNames={allFixedNames}
        getData={(id) => FIXED_EFFECTS[id]}
        selectedRunIds={selected}
        registry={registry}
      />
      <ParamSection
        title="Random Effects (ω)"
        paramNames={allOmegaNames}
        getData={(id) => RANDOM_EFFECTS[id]}
        selectedRunIds={selected}
        registry={registry}
      />
      <ParamSection
        title="Error Model"
        paramNames={allErrorNames}
        getData={(id) => ERROR_PARAMS[id]}
        selectedRunIds={selected}
        registry={registry}
      />
    </div>
  );
}

// ─── Tab: Shrinkage ───────────────────────────────────────────────────────────

function ShrinkageTab({ selected, registry }) {
  if (selected.length === 0) return <EmptyState />;

  const models = registry.filter((r) => selected.includes(r.run_id));

  // Derive RE list dynamically from the data across all selected models
  const reParams = Array.from(
    new Set(selected.flatMap((id) => Object.keys(SHRINKAGE[id] || {})))
  ).sort();

  return (
    <div className="space-y-4">
      {/* Legend */}
      <div className="flex items-center gap-4 text-xs">
        <span className="font-semibold text-gray-600 mr-1">Shrinkage:</span>
        {[
          { label: "< 25%", cls: "bg-green-100 text-green-800" },
          { label: "25–40%", cls: "bg-yellow-100 text-yellow-800" },
          { label: "40–50%", cls: "bg-amber-200 text-amber-900" },
          { label: "> 50%", cls: "bg-red-200 text-red-900" },
        ].map(({ label, cls }) => (
          <div key={label} className="flex items-center gap-1.5">
            <span className={`inline-block w-4 h-4 rounded ${cls}`}></span>
            <span className="text-gray-600">{label}</span>
          </div>
        ))}
      </div>

      {/* Table */}
      <div className="overflow-x-auto rounded-lg border border-gray-200">
        <table className="min-w-full text-sm">
          <thead className="bg-gray-50 border-b border-gray-200">
            <tr>
              <th className="px-3 py-2 text-left text-xs font-semibold text-gray-600 uppercase">Random Effect</th>
              {models.map((m) => (
                <th key={m.run_id} className="px-3 py-2 text-center text-xs font-semibold text-gray-600 uppercase border-l border-gray-200">
                  {m.model_name}
                  <div className="font-normal text-gray-400">{m.run_id}</div>
                </th>
              ))}
            </tr>
          </thead>
          <tbody className="divide-y divide-gray-100">
            {reParams.map((re) => (
              <tr key={re}>
                <td className="px-3 py-2 font-mono font-medium text-gray-700">{re}</td>
                {models.map((m) => {
                  const val = SHRINKAGE[m.run_id]?.[re];
                  if (val === undefined) {
                    return <td key={m.run_id} className="px-3 py-2 text-center text-gray-300 border-l border-gray-100">—</td>;
                  }
                  return (
                    <td key={m.run_id} className={`px-3 py-2 text-center font-mono font-semibold border-l border-gray-100 ${shrinkageColor(val)}`}>
                      {val.toFixed(1)}%
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div className="text-xs text-gray-500 bg-gray-50 rounded px-3 py-2">
        <span className="font-semibold">Interpretation:</span> Shrinkage &gt; 40% suggests the random effect is poorly
        supported by the data and individual estimates are being pulled toward the population mean.
        Consider removing random effects with shrinkage &gt; 50%.
      </div>
    </div>
  );
}

// ─── Tab: Comparison ─────────────────────────────────────────────────────────

function HorizontalBarChart({ title, metric, rows }) {
  const sorted = [...rows].sort((a, b) => a[metric] - b[metric]);
  const best = sorted[0];
  const worst = sorted[sorted.length - 1];
  const range = worst[metric] - best[metric] || 1;

  return (
    <div className="bg-white border border-gray-200 rounded-lg p-4">
      <div className="text-sm font-semibold text-gray-700 mb-3">{title}</div>
      <div className="space-y-3">
        {sorted.map((r) => {
          const isBest = r.run_id === best.run_id;
          // Best gets ~40% width, worst ~90%, scaled linearly between
          const pct = 40 + ((r[metric] - best[metric]) / range) * 50;
          return (
            <div key={r.run_id}>
              <div className="flex justify-between text-xs text-gray-500 mb-0.5">
                <span className="font-medium text-gray-700">{r.model_name}</span>
                {isBest && <span className="text-green-600 font-semibold">◀ best</span>}
              </div>
              <div className="flex items-center gap-2">
                <div className="flex-1 bg-gray-100 rounded h-6 overflow-hidden">
                  <div
                    className={`h-full rounded flex items-center justify-end pr-2 transition-all ${isBest ? "bg-green-400" : "bg-blue-300"}`}
                    style={{ width: `${pct}%` }}
                  >
                    <span className="text-xs font-mono font-semibold text-white">
                      {r[metric].toFixed(1)}
                    </span>
                  </div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ComparisonTab({ selected, registry }) {
  if (selected.length === 0) return <EmptyState />;

  const rows = registry.filter((r) => selected.includes(r.run_id));
  const bestBic = Math.min(...rows.map((r) => r.bic));

  const deltaBicRows = [...rows]
    .sort((a, b) => a.bic - b.bic)
    .map((r) => ({ ...r, delta: r.bic - bestBic }));

  return (
    <div className="space-y-6">
      {/* Bar charts */}
      <div className="grid grid-cols-3 gap-4 mb-2">
        <HorizontalBarChart title="BIC"   metric="bic"  rows={rows} />
        <HorizontalBarChart title="AIC"   metric="aic"  rows={rows} />
        <HorizontalBarChart title="−2LL"  metric="ll"   rows={rows} />
      </div>
      <div className="grid grid-cols-2 gap-4">
        <HorizontalBarChart title="BICc (small-sample corrected)" metric="bicc" rows={rows.filter(r => r.bicc != null)} />
        <HorizontalBarChart title="AICc (small-sample corrected)" metric="aicc" rows={rows.filter(r => r.aicc != null)} />
      </div>

      {/* ΔBIC table */}
      <div>
        <h3 className="text-sm font-semibold text-gray-700 mb-2 uppercase tracking-wide">ΔBIC vs Best Model</h3>
        <div className="overflow-x-auto rounded-lg border border-gray-200">
          <table className="min-w-full text-sm">
            <thead className="bg-gray-50 border-b border-gray-200">
              <tr>
                {["Run", "Model", "BIC", "ΔBIC", "Evidence against model"].map((h) => (
                  <th key={h} className="px-3 py-2 text-left text-xs font-semibold text-gray-600 uppercase whitespace-nowrap">{h}</th>
                ))}
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-100">
              {deltaBicRows.map((r) => {
                const isBest = r.delta === 0;
                return (
                  <tr key={r.run_id} className={isBest ? "bg-green-50" : "bg-white hover:bg-gray-50"}>
                    <td className="px-3 py-2 font-mono text-xs text-gray-500">{r.run_id}</td>
                    <td className="px-3 py-2 font-medium text-gray-900">{r.model_name}</td>
                    <td className="px-3 py-2 font-mono text-gray-700">{r.bic.toFixed(1)}</td>
                    <td className={`px-3 py-2 font-mono ${isBest ? "text-green-700 font-bold" : "text-gray-700"}`}>
                      {isBest ? "—" : `+${r.delta.toFixed(1)}`}
                    </td>
                    <td className="px-3 py-2 text-gray-600">{kassRaftery(r.delta)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* Kass & Raftery reference */}
      <div className="bg-blue-50 border border-blue-200 rounded-lg px-4 py-3 text-xs text-blue-800">
        <span className="font-semibold">Kass & Raftery (1995) ΔBIC scale — evidence against higher-BIC model:</span>
        <span className="ml-2">0–2: Negligible</span>
        <span className="ml-3">2–6: Positive</span>
        <span className="ml-3">6–10: Strong</span>
        <span className="ml-3">&gt;10: Very strong</span>
      </div>
    </div>
  );
}

// ─── Tab: Figures ─────────────────────────────────────────────────────────────

function FiguresTab({ selected, registry }) {
  if (selected.length === 0) return <EmptyState />;

  if (!FIGURES) {
    return (
      <div className="flex flex-col items-center justify-center h-64 text-gray-400">
        <div className="text-4xl mb-3">📊</div>
        <div className="text-base font-medium text-gray-600">No figures generated yet</div>
        <div className="text-sm mt-2 text-gray-500 text-center max-w-md">
          Run{" "}
          <code className="bg-gray-100 px-1.5 py-0.5 rounded font-mono text-xs">
            source(root("R", "generate-explorer-data.R"))
          </code>{" "}
          in R (figures are generated automatically), then refresh the browser.
        </div>
      </div>
    );
  }

  const models = registry.filter((r) => selected.includes(r.run_id));

  return (
    <div className="space-y-8">
      {models.map((m) => {
        const figs = FIGURES[m.run_id];
        return (
          <div key={m.run_id}>
            <div className="flex items-center gap-3 border-b border-gray-200 pb-2 mb-4">
              <span className="font-semibold text-gray-800">{m.model_name}</span>
              <span className="font-mono text-xs text-gray-400">{m.run_id}</span>
              <StatusBadge status={m.status} />
            </div>

            {!figs ? (
              <div className="text-sm text-gray-400 italic">No figures available for this run.</div>
            ) : (
              <div className="grid grid-cols-1 xl:grid-cols-2 gap-4">
                {figs.ebe ? (
                  <div className="border border-gray-200 rounded-lg overflow-hidden bg-white shadow-sm">
                    <div className="px-3 py-2 bg-gray-50 border-b border-gray-200 text-xs font-semibold text-gray-600 uppercase tracking-wide">
                      EBE Parameter Distributions
                    </div>
                    <img src={figs.ebe} alt="EBE distributions" className="w-full" />
                  </div>
                ) : (
                  <div className="border border-dashed border-gray-200 rounded-lg flex items-center justify-center h-40 text-gray-400 text-sm">
                    EBE data not available
                  </div>
                )}

                {figs.fits ? (
                  <div className="border border-gray-200 rounded-lg overflow-hidden bg-white shadow-sm">
                    <div className="px-3 py-2 bg-gray-50 border-b border-gray-200 text-xs font-semibold text-gray-600 uppercase tracking-wide">
                      Individual Fits
                    </div>
                    <img src={figs.fits} alt="Individual fits" className="w-full" />
                  </div>
                ) : (
                  <div className="border border-dashed border-gray-200 rounded-lg flex items-center justify-center h-40 text-gray-400 text-sm">
                    Individual fit data not available
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── Main Component ───────────────────────────────────────────────────────────

function ModelExplorer() {
  const [selected, setSelected]   = React.useState(ALL_RUN_IDS);
  const [sortMetric, setSortMetric] = React.useState("bicc");
  const [activeTab, setActiveTab]  = React.useState("overview");

  const sortedRegistry = React.useMemo(() => {
    return [...REGISTRY].sort((a, b) => a[sortMetric] - b[sortMetric]);
  }, [sortMetric]);

  function toggleModel(run_id) {
    setSelected((prev) =>
      prev.includes(run_id) ? prev.filter((id) => id !== run_id) : [...prev, run_id]
    );
  }

  function toggleAll() {
    setSelected((prev) => (prev.length === REGISTRY.length ? [] : ALL_RUN_IDS));
  }

  const tabs = [
    { key: "overview",    label: "Overview" },
    { key: "parameters",  label: "Parameters" },
    { key: "shrinkage",   label: "Shrinkage" },
    { key: "comparison",  label: "Comparison" },
    { key: "figures",     label: "Figures" },
  ];

  return (
    <div className="flex h-screen bg-gray-100 font-sans text-sm overflow-hidden">
      {/* ── Sidebar ── */}
      <aside className="w-64 flex-shrink-0 bg-white border-r border-gray-200 flex flex-col overflow-hidden">
        {/* Header */}
        <div className="px-4 py-4 border-b border-gray-200">
          <div className="text-base font-bold text-gray-900">Model Explorer</div>
          <div className="text-xs text-gray-500 mt-0.5">Monolix Model Explorer</div>
        </div>

        {/* Sort control */}
        <div className="px-4 py-3 border-b border-gray-100">
          <div className="text-xs font-semibold text-gray-500 uppercase mb-1.5">Sort by</div>
          <div className="flex rounded-md overflow-hidden border border-gray-200 text-xs">
            {[["bicc", "BICc"], ["ll", "−2LL"]].map(([key, label]) => (
              <button
                key={key}
                onClick={() => setSortMetric(key)}
                className={`flex-1 py-1 font-medium transition-colors ${
                  sortMetric === key
                    ? "bg-blue-600 text-white"
                    : "bg-white text-gray-600 hover:bg-gray-50"
                }`}
              >
                {label}
              </button>
            ))}
          </div>
        </div>

        {/* Select all / clear */}
        <div className="px-4 py-2 flex items-center justify-between border-b border-gray-100">
          <button
            onClick={toggleAll}
            className="text-xs text-blue-600 hover:text-blue-800 font-medium"
          >
            {selected.length === REGISTRY.length ? "Clear all" : "Select all"}
          </button>
          <span className="text-xs text-gray-500 font-mono">{selected.length} / {REGISTRY.length}</span>
        </div>

        {/* Model list */}
        <div className="flex-1 overflow-y-auto py-2">
          {sortedRegistry.map((r) => {
            const isSelected = selected.includes(r.run_id);
            return (
              <button
                key={r.run_id}
                onClick={() => toggleModel(r.run_id)}
                className={`w-full text-left px-4 py-3 border-l-2 transition-colors hover:bg-blue-50 ${
                  isSelected
                    ? "border-blue-500 bg-blue-50"
                    : "border-transparent bg-white"
                }`}
              >
                <div className="flex items-center justify-between mb-1">
                  <span className="font-medium text-gray-900 text-xs truncate mr-1">{r.model_name}</span>
                  <StatusBadge status={r.status} />
                </div>
                <div className="flex items-center justify-between">
                  <span className="text-xs font-mono text-gray-500">{r.run_id}</span>
                  <span className="text-xs font-mono text-gray-700 font-semibold">
                    BIC {r.bic.toFixed(1)}
                  </span>
                </div>
              </button>
            );
          })}
        </div>

        {/* Footer */}
        <div className="px-4 py-3 border-t border-gray-200 text-xs text-gray-400">
          mlx-explorer
        </div>
      </aside>

      {/* ── Main area ── */}
      <main className="flex-1 flex flex-col overflow-hidden">
        {/* Tab bar */}
        <div className="bg-white border-b border-gray-200 flex-shrink-0">
          <div className="flex px-6">
            {tabs.map((t) => (
              <button
                key={t.key}
                onClick={() => setActiveTab(t.key)}
                className={`px-4 py-3 text-sm font-medium border-b-2 transition-colors mr-1 ${
                  activeTab === t.key
                    ? "border-blue-500 text-blue-600"
                    : "border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300"
                }`}
              >
                {t.label}
              </button>
            ))}
          </div>
        </div>

        {/* Tab content */}
        <div className="flex-1 overflow-y-auto px-6 py-5">
          {activeTab === "overview"   && <OverviewTab    selected={selected} registry={REGISTRY} />}
          {activeTab === "parameters" && <ParametersTab  selected={selected} registry={REGISTRY} />}
          {activeTab === "shrinkage"  && <ShrinkageTab   selected={selected} registry={REGISTRY} />}
          {activeTab === "comparison" && <ComparisonTab  selected={selected} registry={REGISTRY} />}
          {activeTab === "figures"    && <FiguresTab     selected={selected} registry={REGISTRY} />}
        </div>
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ModelExplorer));

  </script>
</body>
</html>
